name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Repair Gradle Wrapper
        run: |
          # Remove the potentially corrupted jar
          rm -f android/gradle/wrapper/gradle-wrapper.jar
          
          MAX_ATTEMPTS=3
          ATTEMPT=1
          SUCCESS=false
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Download attempt $ATTEMPT of $MAX_ATTEMPTS..."
            if curl -L --max-time 60 --connect-timeout 10 https://services.gradle.org/distributions/gradle-8.12.1-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar; then
              # Verify file integrity (it should be a Zip/Jar file)
              if file android/gradle/wrapper/gradle-wrapper.jar | grep -q "Zip"; then
                echo "Download successful and verified."
                SUCCESS=true
                break
              fi
            fi
            
            echo "Download failed or invalid JAR, retrying in 5 seconds..."
            rm -f android/gradle/wrapper/gradle-wrapper.jar
            sleep 5
            ATTEMPT=$((ATTEMPT + 1))
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "Failed to download a valid gradle-wrapper.jar after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Build Android APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

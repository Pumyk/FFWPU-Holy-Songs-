name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Repair Gradle Wrapper
        run: |
          rm -f android/gradle/wrapper/gradle-wrapper.jar
          mkdir -p android/gradle/wrapper
          
          MAX_ATTEMPTS=3
          ATTEMPT=1
          SUCCESS=false
          
          # Array of mirror URLs to try
          URLS=(
            "https://services.gradle.org/distributions/gradle-8.13.1-wrapper.jar"
            "https://gradle.org/releases/gradle-8.13.1/gradle-8.13.1-wrapper.jar"
          )
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            for URL in "${URLS[@]}"; do
              echo "Download attempt $ATTEMPT of $MAX_ATTEMPTS from: $URL"
              
              # Download with status code check
              HTTP_CODE=$(curl -L --max-time 60 --connect-timeout 10 -w "%{http_code}" -o android/gradle/wrapper/gradle-wrapper.jar "$URL")
              
              if [ "$HTTP_CODE" -eq 200 ]; then
                # Check file size (gradle-wrapper.jar should be > 50KB)
                FILE_SIZE=$(stat -f%z android/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || stat -c%s android/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo 0)
                
                if [ "$FILE_SIZE" -gt 51200 ]; then
                  # Verify it's actually a Zip/Jar file
                  if file android/gradle/wrapper/gradle-wrapper.jar | grep -q "Zip"; then
                    echo "✓ Download successful and verified (size: $FILE_SIZE bytes)"
                    SUCCESS=true
                    break 2
                  fi
                else
                  echo "✗ File too small ($FILE_SIZE bytes), likely error response"
                fi
              else
                echo "✗ HTTP error: $HTTP_CODE"
              fi
              
              rm -f android/gradle/wrapper/gradle-wrapper.jar
            done
            
            if [ "$SUCCESS" = false ]; then
              echo "All mirrors failed, retrying in 5 seconds..."
              sleep 5
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "✗ Failed to download gradle-wrapper.jar after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Build Android APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Repair Gradle Wrapper
        run: |
          # Remove the potentially corrupted jar
          rm -f android/gradle/wrapper/gradle-wrapper.jar
          
          # Download a fresh gradle-wrapper.jar from the official Gradle distribution
          curl -L https://services.gradle.org/distributions/gradle-8.12.1-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar
          
          # Verify the download was successful
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Failed to download gradle-wrapper.jar"
            exit 1
          fi
          
          # Optional: verify file integrity
          file android/gradle/wrapper/gradle-wrapper.jar

      - name: Build Android APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
